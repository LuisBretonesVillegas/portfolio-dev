<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGPI — Práctica Test</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3250;
    --accent: #4f7cff;
    --accent-dim: #1e2d5a;
    --correct: #22c55e;
    --correct-dim: #14532d;
    --wrong: #ef4444;
    --wrong-dim: #450a0a;
    --warn: #f59e0b;
    --warn-dim: #451a03;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --repeat-badge: #7c3aed;
    --repeat-badge-dim: #2e1065;
    --unique-badge: #0891b2;
    --unique-badge-dim: #0c4a6e;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  header span.sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 10px;
    font-weight: 400;
  }
  .score-bar {
    display: flex;
    gap: 18px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .score-bar b { color: var(--text); }

  /* NAV TABS */
  .tab-bar {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
    background: none;
    border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab .count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    border-radius: 999px;
    padding: 0 6px;
    min-width: 20px;
    height: 18px;
    margin-left: 6px;
  }

  /* MAIN */
  main { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }

  .section-header {
    margin-bottom: 22px;
  }
  .section-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .section-header p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .subsection-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subsection-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }

  .q-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .q-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 28px;
    padding-top: 2px;
  }
  .q-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
    flex: 1;
  }
  .q-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .badge.repeat {
    background: var(--repeat-badge-dim);
    color: #a78bfa;
    border: 1px solid var(--repeat-badge);
  }
  .badge.unique {
    background: var(--unique-badge-dim);
    color: #67e8f9;
    border: 1px solid var(--unique-badge);
  }
  .badge.year {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* OPTIONS */
  .q-options {
    padding: 0 18px 16px 58px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    background: var(--surface2);
    user-select: none;
  }
  .opt:hover:not(.disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .opt.disabled { cursor: default; }
  .opt.selected-correct {
    background: var(--correct-dim);
    border-color: var(--correct);
  }
  .opt.selected-wrong {
    background: var(--wrong-dim);
    border-color: var(--wrong);
  }
  .opt.reveal-correct {
    background: var(--correct-dim);
    border-color: var(--correct);
  }
  .opt-letter {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 18px;
    padding-top: 1px;
  }
  .opt-text {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .opt.selected-correct .opt-letter,
  .opt.selected-correct .opt-text { color: var(--correct); }
  .opt.selected-wrong .opt-letter,
  .opt.selected-wrong .opt-text { color: var(--wrong); }
  .opt.reveal-correct .opt-letter,
  .opt.reveal-correct .opt-text { color: var(--correct); }

  /* EXPLANATION */
  .explanation {
    margin: 4px 18px 16px 58px;
    padding: 12px 14px;
    border-radius: 7px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .explanation.correct {
    background: var(--correct-dim);
    border-left: 3px solid var(--correct);
    color: #86efac;
  }
  .explanation.wrong {
    background: var(--wrong-dim);
    border-left: 3px solid var(--wrong);
    color: #fca5a5;
  }
  .explanation.show { display: block; }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* SECTION PANEL */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* RESET BTN */
  .reset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 24px;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
    main { padding: 20px 12px 80px; }
    .q-options { padding-left: 18px; }
    .explanation { margin-left: 18px; }
  }
</style>
</head>
<body data-pagefind-ignore>

<header>
  <div>
    <h1>PGPI — Test<span class="sub">Planificación y Gestión de Proyectos Informáticos · UAL</span></h1>
  </div>
  <div class="score-bar">
    <span>Correctas: <b id="global-correct">0</b></span>
    <span>Erróneas: <b id="global-wrong">0</b></span>
  </div>
</header>

<div class="tab-bar" id="tab-bar"></div>

<main id="main-content"></main>

<script>
// =========================================================
// DATA
// =========================================================
// Correct answer: 0=a, 1=b, 2=c
// years: array of exam years where the question appeared
// topic: tag for categorization
// explanation: shown after answering

const TOPICS = [
  { id: 'all', label: 'Todo' },
  { id: 't1', label: 'T1-2-3 · Conceptos básicos y Ágil' },
  { id: 't4', label: 'T4-5 · Requisitos y Viabilidad' },
  { id: 't6', label: 'T6 · Normativa Legal' },
  { id: 't7', label: 'T7-9 · Estimación' },
  { id: 't10', label: 'T10 · PERT / Gantt' },
  { id: 't11', label: 'T11-12 · Riesgos' },
  { id: 't13', label: 'T13 · Calidad (SQA/RTF)' },
];

const Q = [

  // ===== BLOQUE I: T1-T2-T3 =====
  {
    id: 'q01', topic: 't1',
    text: 'Según PMI, las restricciones del proyecto abarcan:',
    opts: [
      'Alcance, riesgo, tiempo, recursos, coste y calidad.',
      'Alcance, tiempo, recursos, coste, calidad y satisfacción del cliente.',
      'Tiempo y coste son las únicas restricciones a tener en cuenta en un proyecto.'
    ],
    correct: 0,
    years: ['2022A'],
    explanation: 'Correcto. El PMI define 6 restricciones: alcance, riesgo, tiempo, recursos, coste y calidad. La "satisfacción del cliente" no es una restricción formal del triángulo PMI. La opción c es evidentemente falsa por ser solo 2.'
  },
  {
    id: 'q02', topic: 't1',
    text: 'Indica cuál de las siguientes afirmaciones es correcta respecto a cartera/portafolio y programa:',
    opts: [
      'La cartera/portafolio es la combinación de proyectos y programas que desarrolla la organización, alineados con los objetivos estratégicos.',
      'La cartera/portafolio es el grupo de proyectos relacionados que se gestionan de forma coordinada para obtener beneficios que no se obtendrían gestionándolos individualmente.',
      'Las dos afirmaciones son correctas.'
    ],
    correct: 0,
    years: ['2022A'],
    explanation: 'Correcto. La opción a define correctamente el portafolio. La opción b describe un programa (no un portafolio): un programa es un grupo de proyectos relacionados gestionados coordinadamente. No son lo mismo, por lo que c es falsa.'
  },
  {
    id: 'q03', topic: 't1',
    text: 'Según PMI, entre las diferentes áreas de conocimiento en un proyecto podemos encontrar:',
    opts: [
      'Adquisiciones, interesados y recursos humanos.',
      'Alcance, comunicaciones y costes.',
      'Las dos anteriores son correctas.'
    ],
    correct: 2,
    years: ['2022A'],
    explanation: 'Correcto. El PMBOK define 10 áreas de conocimiento que incluyen tanto las de la opción a (Adquisiciones, Interesados, Recursos) como las de la b (Alcance, Comunicaciones, Costes). Ambas listas son subconjuntos válidos.'
  },
  {
    id: 'q04', topic: 't1',
    text: 'Identifique cuál de las siguientes sentencias es FALSA sobre el director de proyecto:',
    opts: [
      'Los clientes, gerentes funcionales o directores de proyecto son algunos ejemplos de stakeholders.',
      'El equipo del proyecto está compuesto por el director del proyecto, el equipo de dirección y otros miembros que desarrollan el trabajo.',
      'Los directores del proyecto entre sus responsabilidades NO se encuentran identificar y dar seguimiento a los riesgos; esa actividad corresponde a la persona encargada del mantenimiento.'
    ],
    correct: 2,
    years: ['2022A'],
    explanation: 'La opción c es falsa. La identificación y seguimiento de riesgos SÍ es una responsabilidad del director del proyecto según el PMBOK. No corresponde al mantenimiento.'
  },
  {
    id: 'q05', topic: 't1',
    text: '¿En qué fase del proyecto es mayor el nivel de coste y de personal?',
    opts: [
      'Al inicio del proyecto.',
      'Tanto el coste como el personal debe ser homogéneo a lo largo del proyecto.',
      'En las fases intermedias del proyecto.'
    ],
    correct: 2,
    years: ['2022B', '2022exam'],
    explanation: 'Correcto. Según la curva de ciclo de vida de un proyecto, los recursos y el coste son bajos al inicio, alcanzan su máximo en las fases intermedias de ejecución y luego declinan al cierre.'
  },
  {
    id: 'q06', topic: 't1',
    text: '¿Cómo es la planificación en un proyecto ágil?',
    opts: [
      'Los planes se realizan por anticipado y se elaboran progresivamente cada vez que hay solicitudes de cambio.',
      'La planificación se realiza en reuniones graduales entre las iteraciones.',
      'Como regla, los equipos ágiles dedican menos tiempo a la planificación que los equipos no ágiles, a menos que se requiera más planificación para el cumplimiento de acciones o para las adquisiciones.'
    ],
    correct: 1,
    years: ['2022B', '2022exam'],
    explanation: 'Correcto. En ágil, la planificación es adaptativa y se realiza iterativamente en las reuniones entre sprints (sprint planning, retrospectivas). La opción a describe un enfoque predictivo. La opción c es incorrecta: los equipos ágiles no dedican necesariamente menos tiempo a planificar.'
  },
  {
    id: 'q07', topic: 't1',
    text: 'Al margen de consideraciones ajenas al dpto. de TI, la principal causa de fracaso de proyectos de desarrollo de software es:',
    opts: [
      'La mala gestión de los requisitos en la determinación del alcance en la fase inicial del proyecto y en la gestión de los cambios del alcance una vez está el proyecto en ejecución.',
      'La dificultad de realizar estimaciones del esfuerzo del proyecto, ya que las métricas estaban enfocadas a líneas de código en lenguajes estructurados.',
      'Se abusa de la subcontratación del software y se realiza mala gestión de proyectos por dicha causa.'
    ],
    correct: 0,
    years: ['2022B', '2022exam'],
    explanation: 'Correcto. Los estudios (Standish CHAOS Report, etc.) muestran sistemáticamente que la gestión deficiente de requisitos y el control de cambios del alcance es la principal causa de fracaso en proyectos software.'
  },
  {
    id: 'q08', topic: 't1',
    text: 'Los cinco grupos de procesos en la dirección de proyectos son: ¿Cuál de las siguientes afirmaciones sobre dirección de proyectos es INCORRECTA?',
    opts: [
      'El objetivo principal de la dirección de proyectos es cumplir con los requisitos del proyecto.',
      'Los cinco grupos de procesos en la dirección de proyectos son: iniciación, planificación, ejecución, seguimiento y control y cierre.',
      'La dirección de proyectos NO es la encargada de equilibrar las restricciones contrapuestas del proyecto.'
    ],
    correct: 2,
    years: ['2019', '2019A', '2022recap'],
    explanation: 'La opción c es incorrecta. La dirección de proyectos SÍ es la encargada de equilibrar las restricciones contrapuestas (alcance, tiempo, coste, calidad, etc.). Las opciones a y b son correctas.'
  },
  {
    id: 'q09', topic: 't1',
    text: 'Los tipos básicos de relaciones entre fases de un proyecto son:',
    opts: [
      'Relación secuencial, relación de superposición y relación iterativa.',
      'Relación de gobernabilidad, relación con los stakeholders y relación bilateral.',
      'Relación secuencial, relación bilateral y relación de superposición.'
    ],
    correct: 0,
    years: ['2019', '2019A', '2022B', '2022exam', '2022recap', '2026'],
    explanation: 'Correcto. Según el PMBOK, los tres tipos básicos de relación entre fases son: secuencial (una fase empieza cuando termina la anterior), de superposición (fases simultáneas) e iterativa (fases que se repiten).'
  },
  {
    id: 'q10', topic: 't1',
    text: 'Una editorial solicita a una empresa de informática que desarrolle software para un libro electrónico. El presidente asigna un director de proyecto. En este ámbito:',
    opts: [
      'Patrocinador: Presidente de la empresa de informática. Cliente: Editorial. Usuario: Persona que compra el libro electrónico en el mercado.',
      'Patrocinador: Director de Proyecto. Vendedor/Socio de Negocio: Editorial.',
      'Gerente de operaciones: Editorial. PMO: Presidente de la empresa de informática. Usuario: persona que compra el libro en el mercado.'
    ],
    correct: 0,
    years: ['2019', '2019A', '2022recap'],
    explanation: 'Correcto. El patrocinador (sponsor) es quien asigna recursos y autoriza el proyecto → Presidente. El cliente es quien encarga el trabajo → Editorial. El usuario es quien usará el producto final → el comprador del libro.'
  },
  {
    id: 'q11', topic: 't1',
    text: 'Entre las grandes desventajas de la metodología ágil, podemos destacar:',
    opts: [
      'Falta de atención a la documentación y dificultad para determinar el precio y el tiempo.',
      'Menor motivación entre los trabajadores del proyecto y falta de organización en el equipo.',
      'Menor satisfacción del cliente y dificultad para gestionar los cambios.'
    ],
    correct: 0,
    years: ['2022A'],
    explanation: 'Correcto. Las metodologías ágiles tienen como desventajas conocidas la escasa documentación (se prioriza software funcional sobre documentación exhaustiva) y la dificultad para fijar a priori un presupuesto y plazo cerrado.'
  },
  {
    id: 'q12', topic: 't1',
    text: 'Son procesos que pertenecen al grupo de Proceso PLANIFICACIÓN:',
    opts: [
      'Desarrollar acta de Constitución del Proyecto. Identificar a los interesados.',
      'Crear WBS. Determinar el presupuesto.',
      'Desarrollar el acta de constitución del proyecto. Desarrollar el plan de dirección del proyecto.'
    ],
    correct: 1,
    years: ['2022A'],
    explanation: 'Correcto. El WBS y la determinación del presupuesto pertenecen al grupo de Planificación. El acta de constitución e identificar interesados pertenecen al grupo de Iniciación.'
  },

  // ===== T4-T5: REQUISITOS Y VIABILIDAD =====
  {
    id: 'q20', topic: 't4',
    text: 'El estudio de viabilidad en un proyecto consiste en:',
    opts: [
      'Estudio que garantice que el proyecto es factible y es la mejor solución.',
      'Estudio que garantice que el proyecto se puede integrar en otros sistemas de la empresa y se puede hacer en plazo y coste.',
      'Las dos anteriores son correctas.'
    ],
    correct: 2,
    years: ['2019', '2019A', '2022recap'],
    explanation: 'Correcto. El estudio de viabilidad verifica tanto la factibilidad general (que se pueda hacer y sea la mejor solución) como la integración, el plazo y el coste. Ambas opciones son aspectos complementarios del mismo concepto.'
  },
  {
    id: 'q21', topic: 't4',
    text: 'El objetivo básico del estudio de viabilidad es:',
    opts: [
      'Determinar las actividades principales dentro del proyecto y desglosarlas en paquetes de trabajo componentes.',
      'Determinar si la organización cuenta con los recursos y capacidades requeridas para llevar a cabo el proyecto.',
      'Incorporar el proyecto con las metas estratégicas de la empresa.'
    ],
    correct: 1,
    years: ['2018', '2022recap'],
    explanation: 'Correcto. El objetivo básico del estudio de viabilidad es determinar si la organización tiene los recursos y capacidades para ejecutar el proyecto. La opción a describe la elaboración de la WBS. La opción c es incompleta (es uno de varios aspectos, no el único objetivo).'
  },
  {
    id: 'q22', topic: 't4',
    text: 'El estudio de viabilidad del proyecto se realiza desde cuatro perspectivas diferentes:',
    opts: [
      'Económico, normativo, legal y social.',
      'Económico, técnico, operativo y legal.',
      'Económico, técnico, operativo y social.'
    ],
    correct: 1,
    years: ['2018', '2022recap'],
    explanation: 'Correcto. Las cuatro perspectivas clásicas del estudio de viabilidad son: económica (coste/beneficio), técnica (tecnología disponible), operativa (capacidad organizacional) y legal (requisitos normativos y legales).'
  },
  {
    id: 'q23', topic: 't4',
    text: 'El informe de viabilidad:',
    opts: [
      'Tiene como objetivo informar sobre si el proyecto se realiza o no.',
      'Valora con más peso los aspectos económicos que los técnicos, ya que los primeros son más importantes de cara a la decisión de continuar con el proyecto.',
      'Es la entrada a la planificación y puede incluir una valoración de distintas alternativas.'
    ],
    correct: 2,
    years: ['2022A'],
    explanation: 'Correcto. El informe de viabilidad es la entrada para la fase de planificación y puede incluir comparativa de alternativas. La opción a es incompleta (su objetivo no es solo decir sí/no, sino documentar el análisis completo). La opción b es falsa: ninguna perspectiva tiene más peso a priori.'
  },
  {
    id: 'q24', topic: 't4',
    text: 'Estudio de viabilidad en un proyecto software:',
    opts: [
      'Debe hacerse el estudio de viabilidad cuando el coste supere el umbral Boehm.',
      'Debe hacerse un estudio de viabilidad como una de las etapas iniciales del ciclo de vida.',
      'Solo debe realizarse el estudio de viabilidad cuando el cliente lo solicita.'
    ],
    correct: 1,
    years: ['2017', '2022recap'],
    explanation: 'Correcto. El estudio de viabilidad es una etapa estándar e inicial del ciclo de vida de cualquier proyecto software, no condicional al coste ni a la solicitud del cliente.'
  },
  {
    id: 'q25', topic: 't4',
    text: 'Indique cuál de las siguientes afirmaciones es correcta sobre entrevistas:',
    opts: [
      'En la estructura de una entrevista en embudo, el entrevistador adopta un método deductivo.',
      'Es aconsejable grabar la primera TFEA del equipo de trabajo con el cliente para tener constancia de los requisitos del cliente.',
      'En la estructura de una entrevista en pirámide, el entrevistador adopta un método deductivo.'
    ],

// =========================================================
// STATE
// =========================================================
let answers = {}; // questionId -> { selected, correct }
let currentTopic = 'all';

function getFilteredQuestions(topicId) {
  if (topicId === 'all') return Q;
  return Q.filter(q => q.topic === topicId);
}

function isRepeat(q) {
  return q.years.length > 1;
}

function calcStats(questions) {
  let correct = 0, wrong = 0, total = questions.length, answered = 0;
  questions.forEach(q => {
    if (answers[q.id] !== undefined) {
      answered++;
      if (answers[q.id].correct) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, total, answered };
}

// =========================================================
// RENDER
// =========================================================
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  TOPICS.forEach(t => {
    const qs = getFilteredQuestions(t.id);
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === currentTopic ? ' active' : '');
    btn.innerHTML = t.label + `<span class="count">${qs.length}</span>`;
    btn.onclick = () => { currentTopic = t.id; render(); };
    bar.appendChild(btn);
  });
}

function renderSection() {
  const main = document.getElementById('main-content');
  const qs = getFilteredQuestions(currentTopic);
  const stats = calcStats(qs);

  const repeated = qs.filter(q => isRepeat(q));
  const unique = qs.filter(q => !isRepeat(q));

  let html = `
    <div class="section-header">
      <h2>${TOPICS.find(t => t.id === currentTopic).label}</h2>
      <p>${stats.answered} respondidas de ${stats.total} · ${stats.correct} correctas · ${stats.wrong} incorrectas</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${stats.total ? (stats.answered/stats.total*100) : 0}%"></div></div>
      <span class="progress-text">${stats.total ? Math.round(stats.answered/stats.total*100) : 0}%</span>
    </div>
  `;

  if (repeated.length > 0) {
    html += `<div class="subsection-title"><span class="badge repeat" style="font-size:11px;padding:3px 10px;">Preguntas repetidas en exámenes</span></div>`;
    repeated.forEach((q, i) => { html += renderQuestion(q, i + 1); });
  }

  if (unique.length > 0) {
    html += `<div class="subsection-title"><span class="badge unique" style="font-size:11px;padding:3px 10px;">Preguntas que no se han repetido</span></div>`;
    unique.forEach((q, i) => { html += renderQuestion(q, repeated.length + i + 1); });
  }

  html += `<button class="reset-btn" onclick="resetSection()">Reiniciar esta sección</button>`;

  main.innerHTML = html;
  updateGlobalScore();
}

function renderQuestion(q, num) {
  const ans = answers[q.id];
  const cardClass = ans ? (ans.correct ? 'answered-correct' : 'answered-wrong') : '';
  const years = q.years.join(', ');
  const repeatBadge = isRepeat(q)
    ? `<span class="badge repeat">Repetida · ${q.years.length} exámenes</span>`
    : `<span class="badge unique">Única</span>`;

  let optsHtml = q.opts.map((opt, idx) => {
    let cls = 'opt';
    if (ans !== undefined) {
      cls += ' disabled';
      if (idx === q.correct) cls += ' reveal-correct';
      if (idx === ans.selected && ans.selected !== q.correct) cls += ' selected-wrong';
      if (idx === ans.selected && ans.selected === q.correct) cls += ' selected-correct';
    }
    const letter = String.fromCharCode(97 + idx).toUpperCase();
    return `<div class="${cls}" onclick="selectAnswer('${q.id}', ${idx})">
      <span class="opt-letter">${letter}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  }).join('');

  const expClass = ans ? (ans.correct ? 'explanation correct show' : 'explanation wrong show') : 'explanation';
  const expIcon = ans ? (ans.correct ? '✓ Correcto.' : '✗ Incorrecto.') : '';

  return `
    <div class="q-card ${cardClass}" id="card-${q.id}">
      <div class="q-header">
        <span class="q-num">${num}.</span>
        <div style="flex:1">
          <div class="q-text">${q.text}</div>
          <div class="q-meta">
            ${repeatBadge}
            <span class="badge year">📅 ${years}</span>
          </div>
        </div>
      </div>
      <div class="q-options">${optsHtml}</div>
      <div class="${expClass}" id="exp-${q.id}">
        <strong>${expIcon}</strong> ${q.explanation}
      </div>
    </div>
  `;
}

function selectAnswer(qId, selected) {
  if (answers[qId] !== undefined) return;
  const q = Q.find(x => x.id === qId);
  const isCorrect = selected === q.correct;
  answers[qId] = { selected, correct: isCorrect };
  updateGlobalScore();

  // Re-render just this card
  const card = document.getElementById('card-' + qId);
  const qs = getFilteredQuestions(currentTopic);
  const num = qs.findIndex(x => x.id === qId) + 1;
  const newHtml = renderQuestion(q, num);
  const wrapper = document.createElement('div');
  wrapper.innerHTML = newHtml;
  card.replaceWith(wrapper.firstElementChild);

  // Update stats
  renderHeader();
}

function updateGlobalScore() {
  let correct = 0, wrong = 0;
  Object.values(answers).forEach(a => {
    if (a.correct) correct++; else wrong++;
  });
  document.getElementById('global-correct').textContent = correct;
  document.getElementById('global-wrong').textContent = wrong;
}

function renderHeader() {
  const qs = getFilteredQuestions(currentTopic);
  const stats = calcStats(qs);
  const hdr = document.querySelector('.section-header p');
  if (hdr) {
    hdr.textContent = `${stats.answered} respondidas de ${stats.total} · ${stats.correct} correctas · ${stats.wrong} incorrectas`;
  }
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = (stats.total ? (stats.answered/stats.total*100) : 0) + '%';
  const txt = document.querySelector('.progress-text');
  if (txt) txt.textContent = (stats.total ? Math.round(stats.answered/stats.total*100) : 0) + '%';
}

function resetSection() {
  const qs = getFilteredQuestions(currentTopic);
  qs.forEach(q => { delete answers[q.id]; });
  render();
}

function render() {
  renderTabs();
  renderSection();
}

render();
</script>
</body>
</html>
